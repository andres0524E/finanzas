<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Financiero</title>
    
    <link rel="icon" href="img/favicon.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- VARIABLES CSS (Colores y Glassmorphism) --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: rgba(0, 0, 0, 0.08);
            
            --accent-purple: #8A05BE;
            --accent-blue-bbva: #004481;
            --accent-blue-mp: #009EE3;
            --accent-yellow: #d97706;
            --accent-green: #059669;
            --accent-red: #dc2626;
            
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #181818 0%, #000000 100%);
            --panel-bg: rgba(30, 30, 30, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1);
            
            --accent-purple: #a855f7;
            --accent-blue-bbva: #5aa1e3;
            --accent-blue-mp: #52c8ff;
            --accent-yellow: #fbbf24;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0;
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-attachment: fixed; 
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden; 
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px; 
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        header h1 { font-size: 1.3rem; margin: 0; font-weight: 800; letter-spacing: -0.5px;}

        .theme-btn {
            background-color: var(--panel-bg);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* --- EFECTO GLASSMORPHISM --- */
        .stat-card, .month-card, .inner-section, .card-tabs, .bank-debt-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--card-shadow);
        }

        /* --- PANELES RESUMEN --- */
        .summary-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 16px;
        }

        .stat-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .text-purple { color: var(--accent-purple); }

        /* --- TARJETAS MENSUALES --- */
        .months-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
        }

        .month-card {
            padding: 20px;
            border-radius: 16px;
        }

        .month-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .month-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-primary); }

        /* --- SWITCH DE TARJETAS --- */
        .card-tabs {
            display: flex;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 15px;
        }

        .card-tab {
            flex: 1;
            text-align: center;
            padding: 8px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .card-tab.active {
            background-color: rgba(128, 128, 128, 0.15); 
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        /* --- TARJETA DE BANCO COMPACTA --- */
        .bank-debt-card {
            padding: 15px; 
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px; 
            transition: var(--transition);
        }
        .bank-debt-card:hover { border-color: var(--accent-purple); }

        .bank-logo {
            height: 26px; 
            width: auto; 
            max-width: 70px; 
            border-radius: 4px;
            object-fit: contain; 
            background-color: transparent; 
        }

        /* Colores de texto para saldos */
        .text-Nu { color: var(--accent-purple); }
        .text-BBVA { color: var(--accent-blue-bbva); }
        .text-MP { color: var(--accent-blue-mp); }
        
        [data-theme="dark"] .text-BBVA { color: #5aa1e3; }
        [data-theme="dark"] .text-MP { color: #52c8ff; }

        /* --- SECCIONES INTERNAS --- */
        .inner-section {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: bold;
            text-align: center;
        }
        
        .title-green { color: var(--accent-green); }
        .title-red { color: var(--accent-red); }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.95rem;
        }

        .list-item:last-child { border-bottom: none; }

        /* --- BOTONES DE ACCIÓN (FONT AWESOME) --- */
        .btn-action-fa {
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }
        
        .btn-edit-fa { background-color: rgba(128, 128, 128, 0.15); color: var(--text-primary); border: 1px solid var(--panel-border);}
        .btn-edit-fa:hover { background-color: rgba(128, 128, 128, 0.3); }
        
        .btn-save-fa { background-color: var(--accent-green); color: white; }
        .btn-save-fa:hover { filter: brightness(1.1); }
        
        .btn-cancel-fa { background-color: var(--accent-red); color: white; }
        .btn-cancel-fa:hover { filter: brightness(1.1); }

        .btn-delete-fa {
            background-color: transparent;
            color: var(--text-secondary);
            border: none;
            width: 28px; 
            height: 28px;
            font-size: 1rem;
            cursor: pointer;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .btn-delete-fa:hover { color: var(--accent-red); }

        /* --- FORMULARIOS --- */
        .add-form {
            display: flex;
            gap: 8px;
            margin-top: 5px;
            align-items: center;
            flex-wrap: wrap; 
        }

        .add-form input {
            background-color: rgba(0, 0, 0, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px; 
            backdrop-filter: blur(5px);
            transition: var(--transition);
            width: 100%;
            box-sizing: border-box; 
        }
        
        [data-theme="dark"] .add-form input { background-color: rgba(255, 255, 255, 0.05); }

        .add-form input:focus { outline: none; border-color: var(--accent-purple); background-color: var(--panel-bg); }

        .input-flex { flex: 2; min-width: 100px; }
        .input-monto { flex: 1; min-width: 80px; text-align: right; }
        
        .input-monto-edit { 
            width: 100px; 
            text-align: right; 
            padding: 8px; 
            border-radius: 6px; 
            border: 1px solid var(--accent-purple); 
            background: rgba(0, 0, 0, 0.03); 
            color: var(--text-primary); 
            font-weight: bold;
        }
        [data-theme="dark"] .input-monto-edit { background: rgba(255, 255, 255, 0.08); }

        .border-red input.input-monto { border-color: rgba(239, 68, 68, 0.4); }
        .border-green input.input-monto { border-color: rgba(16, 185, 129, 0.4); }

        .input-monto::-webkit-outer-spin-button,
        .input-monto::-webkit-inner-spin-button,
        .input-monto-edit::-webkit-outer-spin-button,
        .input-monto-edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-add-fa {
            border: none;
            border-radius: 8px;
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-add-fa:active { transform: scale(0.95); }

        .btn-green-add { background-color: var(--accent-green); color: white; }
        .btn-red-add { background-color: var(--accent-red); color: white; }

        /* --- TOTALES --- */
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .total-title { font-weight: bold; font-size: 0.95rem; }
        .total-value { font-size: 1.4rem; font-weight: bold; color: var(--text-primary); }

        /* --- MEDIA QUERY PARA CELULARES (CORREGIDO) --- */
        @media (max-width: 450px) {
            /* Forzamos a que el "Concepto" ocupe toda la línea arriba, 
               y que el input de dinero y el botón queden juntos abajo en una fila */
            .add-form input[type="text"] { flex: 1 1 100%; margin-bottom: 5px; }
            .add-form input[type="number"] { flex: 1; text-align: left; }
            /* El botón se mantiene cuadrado y a la derecha del input de número */
            .btn-add-fa { width: 48px; height: 42px; flex: 0 0 48px; }
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestor Financiero</h1>
            <button class="theme-btn" id="themeToggleBtn"><i class="fa-solid fa-sun"></i> Claro</button>
        </header>

        <section class="summary-panel">
            <div class="stat-card">
                <div class="stat-title">Deuda Total Acumulada (Global)</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div class="stat-value text-purple" id="total-deuda-global">$0.00</div>
                    <button class="btn-action-fa btn-edit-fa" id="btn-edit-global" title="Editar Deuda Base"><i class="fa-solid fa-pen"></i></button>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-title" id="proximo-pago-title">Próximo Pago Total</div>
                <div class="stat-value" id="proximo-pago">$0.00</div>
            </div>
        </section>

        <section class="months-panel" id="months-container">
            </section>
    </div>

    <script>
        // --- 1. LÓGICA DEL TEMA ---
        const themeBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;

        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> Oscuro';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> Claro';
            }
        });

        // --- 2. GESTIÓN DE LA BASE DE DATOS LOCAL ---
        const DB_KEY_GLOBAL = 'miGestorDeudaGlobal_v7';
        const DB_KEY_DATA = 'miGestorFinancieroData_v7';

        let deudaGlobalBase = parseFloat(localStorage.getItem(DB_KEY_GLOBAL));
        if (isNaN(deudaGlobalBase)) deudaGlobalBase = 10537.00;

        const defaultData = [
            { mes: 'Marzo (Actual)', deudas: { 'Nu': 2515.50, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Abril', deudas: { 'Nu': 1317.29, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Mayo', deudas: { 'Nu': 1317.28, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Junio', deudas: { 'Nu': 1101.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Julio', deudas: { 'Nu': 1101.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Agosto', deudas: { 'Nu': 1101.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Septiembre', deudas: { 'Nu': 1066.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Octubre', deudas: { 'Nu': 1066.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Noviembre', deudas: { 'Nu': 1066.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] },
            { mes: 'Diciembre', deudas: { 'Nu': 1066.00, 'BBVA': 0, 'Mercado Pago': 0 }, pagos: [], gastosPersonales: [] }
        ];

        let financeData = [];
        let activeTabState = {}; 
        let editingCardIndex = null; 

        function loadData() {
            const savedData = localStorage.getItem(DB_KEY_DATA);
            if (savedData) {
                try {
                    financeData = JSON.parse(savedData);
                    if (!Array.isArray(financeData)) financeData = defaultData;
                } catch(e) {
                    financeData = defaultData;
                }
            } else {
                financeData = defaultData;
            }
        }

        function saveData() {
            localStorage.setItem(DB_KEY_DATA, JSON.stringify(financeData));
        }

        // --- 3. FUNCIONES DE INTERFAZ ---
        const formatMoney = (value) => {
            return '$' + (value || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        function renderCards() {
            const container = document.getElementById('months-container');
            container.innerHTML = ''; 
            
            let sumaTotalGastosDeTodosLosMeses = 0;
            let sumaTotalPagosDeTodosLosMeses = 0;
            let sumaDeudasExtraBBVAyMP = 0;

            financeData.forEach((data, index) => {
                try {
                    let sumaGastosMes = 0;
                    let sumaPagosMes = 0;
                    
                    if(!data.deudas) data.deudas = { 'Nu': 0, 'BBVA': 0, 'Mercado Pago': 0 };
                    if(!data.gastosPersonales) data.gastosPersonales = [];
                    if(!data.pagos) data.pagos = [];

                    let sumaTodasTarjetasMes = (data.deudas['Nu'] || 0) + (data.deudas['BBVA'] || 0) + (data.deudas['Mercado Pago'] || 0);
                    sumaDeudasExtraBBVAyMP += (data.deudas['BBVA'] || 0) + (data.deudas['Mercado Pago'] || 0);
                    
                    let currentTab = activeTabState[index] || 'Nu';
                    let deudaTabActual = data.deudas[currentTab] || 0;

                    let logoSrc = 'img/Nu.jpg'; let textClass = 'text-Nu';
                    if(currentTab === 'BBVA') { logoSrc = 'img/bbva.png'; textClass = 'text-BBVA';}
                    if(currentTab === 'Mercado Pago') { logoSrc = 'img/mercadoapgo.png'; textClass = 'text-MP'; }

                    let tarjetaContentHtml = '';
                    if (editingCardIndex == index) {
                        tarjetaContentHtml = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${logoSrc}" alt="${currentTab}" class="bank-logo" onerror="this.style.display='none'">
                                <span style="font-weight: 600;">${currentTab}</span>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <input type="number" id="edit-monto-${index}" class="input-monto-edit" value="${deudaTabActual}">
                                <button class="btn-action-fa btn-save-fa btn-save-tarjeta" data-month="${index}" data-banco="${currentTab}"><i class="fa-solid fa-check"></i></button>
                                <button class="btn-action-fa btn-cancel-fa btn-cancel-tarjeta"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        `;
                    } else {
                        tarjetaContentHtml = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${logoSrc}" alt="${currentTab}" class="bank-logo" onerror="this.style.display='none'">
                                <span style="font-weight: 600;">${currentTab}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <strong class="${textClass}" style="font-size: 1.15rem;">${formatMoney(deudaTabActual)}</strong>
                                <button class="btn-action-fa btn-edit-fa btn-edit-tarjeta" data-month="${index}"><i class="fa-solid fa-pen"></i></button>
                            </div>
                        `;
                    }

                    let seccionTarjetasHtml = `
                        <div class="inner-section" style="padding: 10px 15px; margin-bottom: 10px;">
                            <div class="card-tabs">
                                <div class="card-tab tab-switch ${currentTab === 'Nu' ? 'active' : ''}" data-month="${index}" data-tab="Nu">Nu</div>
                                <div class="card-tab tab-switch ${currentTab === 'BBVA' ? 'active' : ''}" data-month="${index}" data-tab="BBVA">BBVA</div>
                                <div class="card-tab tab-switch ${currentTab === 'Mercado Pago' ? 'active' : ''}" data-month="${index}" data-tab="Mercado Pago">MP</div>
                            </div>
                        </div>
                        <div class="bank-debt-card">
                            ${tarjetaContentHtml}
                        </div>
                    `;

                    let listaGastosHtml = '';
                    if (data.gastosPersonales.length > 0) {
                        data.gastosPersonales.forEach((gasto, gastoIndex) => {
                            sumaGastosMes += gasto.monto;
                            sumaTotalGastosDeTodosLosMeses += gasto.monto; 
                            listaGastosHtml += `
                                <div class="list-item">
                                    <span><i class="fa-solid fa-cart-shopping" style="color: var(--accent-red); margin-right: 8px;"></i>${gasto.concepto}</span>
                                    <div style="display: flex; align-items: center;">
                                        <strong>${formatMoney(gasto.monto)}</strong>
                                        <button class="btn-delete-fa btn-delete-gasto" data-month="${index}" data-index="${gastoIndex}"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        listaGastosHtml = '<div style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; padding: 5px 0;">Sin gastos extra</div>';
                    }

                    let listaPagosHtml = '';
                    if (data.pagos.length > 0) {
                        data.pagos.forEach((pago, pagoIndex) => {
                            sumaPagosMes += pago.monto;
                            sumaTotalPagosDeTodosLosMeses += pago.monto; 
                            listaPagosHtml += `
                                <div class="list-item">
                                    <span><i class="fa-solid fa-circle-dollar-to-slot" style="color: var(--accent-green); margin-right: 8px;"></i>Pago #${pagoIndex + 1}</span>
                                    <div style="display: flex; align-items: center;">
                                        <strong style="color: var(--accent-green);">- ${formatMoney(pago.monto)}</strong>
                                        <button class="btn-delete-fa btn-delete-pago" data-month="${index}" data-index="${pagoIndex}"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        listaPagosHtml = '<div style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; padding: 5px 0;">Aún no hay abonos registrados</div>';
                    }

                    const totalRestanteMes = sumaTodasTarjetasMes + sumaGastosMes - sumaPagosMes;

                    if (index === 0) {
                        document.getElementById('proximo-pago-title').innerText = `Total a Pagar (${data.mes})`;
                        document.getElementById('proximo-pago').innerText = formatMoney(totalRestanteMes);
                    }

                    const cardHtml = `
                        <div class="month-card">
                            <div class="month-header">
                                <h2>${data.mes}</h2>
                            </div>
                            
                            ${seccionTarjetasHtml}

                            <div class="inner-section border-red" style="border-left: 3px solid var(--accent-red);">
                                <div class="section-title title-red"><i class="fa-solid fa-tags"></i> Otros Gastos</div>
                                <div style="margin-bottom: 15px;">${listaGastosHtml}</div>
                                <div class="add-form">
                                    <input type="text" id="concepto-${index}" class="input-flex" placeholder="Concepto">
                                    <input type="number" id="monto-gasto-${index}" class="input-monto" placeholder="$0.00">
                                    <button class="btn-add-fa btn-green-add btn-add-gasto" data-month="${index}"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>

                            <div class="inner-section border-green" style="border-left: 3px solid var(--accent-green);">
                                <div class="section-title title-green"><i class="fa-solid fa-circle-check"></i> Pagos Realizados</div>
                                <div style="margin-bottom: 15px;">${listaPagosHtml}</div>
                                <div class="add-form">
                                    <input type="number" id="monto-pago-${index}" class="input-monto" placeholder="Cantidad ($)">
                                    <button class="btn-add-fa btn-red-add btn-add-pago" data-month="${index}" title="Restar de la deuda"><i class="fa-solid fa-minus"></i></button>
                                </div>
                            </div>

                            <div class="total-row">
                                <span class="total-title">Total a Pagar</span>
                                <span class="total-value">${formatMoney(totalRestanteMes)}</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                } catch (error) {
                    console.error("Error cargando mes", index, error);
                }
            });

            const deudaGlobalReal = deudaGlobalBase + sumaDeudasExtraBBVAyMP + sumaTotalGastosDeTodosLosMeses - sumaTotalPagosDeTodosLosMeses;
            document.getElementById('total-deuda-global').innerText = formatMoney(deudaGlobalReal);
        }

        // --- 4. ESCUCHAR INTERACCIONES ---
        document.getElementById('btn-edit-global').addEventListener('click', () => {
            let nuevaDeuda = prompt("Ingresa tu Deuda Total Base Actual (Ej. 10537):", deudaGlobalBase);
            if (nuevaDeuda !== null && !isNaN(parseFloat(nuevaDeuda))) {
                deudaGlobalBase = parseFloat(nuevaDeuda);
                localStorage.setItem(DB_KEY_GLOBAL, deudaGlobalBase);
                renderCards();
            }
        });

        document.getElementById('months-container').addEventListener('click', (evento) => {
            const targetBtn = evento.target.closest('button') || evento.target;

            if (evento.target.classList.contains('tab-switch')) {
                const indexMes = evento.target.getAttribute('data-month');
                const selectedTab = evento.target.getAttribute('data-tab');
                activeTabState[indexMes] = selectedTab;
                editingCardIndex = null; 
                renderCards();
            }

            if (targetBtn.classList.contains('btn-edit-tarjeta')) {
                editingCardIndex = targetBtn.getAttribute('data-month');
                renderCards();
            }
            if (targetBtn.classList.contains('btn-cancel-tarjeta')) {
                editingCardIndex = null;
                renderCards();
            }
            if (targetBtn.classList.contains('btn-save-tarjeta')) {
                const index = targetBtn.getAttribute('data-month');
                const banco = targetBtn.getAttribute('data-banco');
                const monto = parseFloat(document.getElementById(`edit-monto-${index}`).value);

                if (!isNaN(monto) && monto >= 0) {
                    financeData[index].deudas[banco] = monto; 
                    saveData();
                    editingCardIndex = null;
                    renderCards();
                } else {
                    alert("Ingresa un monto válido.");
                }
            }

            if (targetBtn.classList.contains('btn-add-gasto')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const conceptoStr = document.getElementById(`concepto-${indexMes}`).value.trim();
                const montoNum = parseFloat(document.getElementById(`monto-gasto-${indexMes}`).value);

                if (conceptoStr !== "" && !isNaN(montoNum) && montoNum > 0) {
                    financeData[indexMes].gastosPersonales.push({ concepto: conceptoStr, monto: montoNum });
                    saveData();
                    renderCards();
                } else {
                    alert("Ingresa un concepto y monto válido.");
                }
            }
            if (targetBtn.classList.contains('btn-delete-gasto')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const indexElemento = targetBtn.getAttribute('data-index');
                financeData[indexMes].gastosPersonales.splice(indexElemento, 1);
                saveData();
                renderCards();
            }

            if (targetBtn.classList.contains('btn-add-pago')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const montoNum = parseFloat(document.getElementById(`monto-pago-${indexMes}`).value);

                if (!isNaN(montoNum) && montoNum > 0) {
                    financeData[indexMes].pagos.push({ monto: montoNum });
                    saveData();
                    renderCards();
                } else {
                    alert("Por favor, ingresa el monto que abonaste.");
                }
            }
            if (targetBtn.classList.contains('btn-delete-pago')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const indexElemento = targetBtn.getAttribute('data-index');
                financeData[indexMes].pagos.splice(indexElemento, 1);
                saveData();
                renderCards();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderCards();
        });

    </script>
</body>
</html>
