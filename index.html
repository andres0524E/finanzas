<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Financiero</title>
    
    <link rel="icon" href="img/favicon.png" type="image/png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- VARIABLES CSS --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(255, 255, 255, 0.5);
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: rgba(0, 0, 0, 0.08);
            
            --accent-purple: #8A05BE;
            --accent-blue-bbva: #004481;
            --accent-blue-mp: #009EE3;
            --accent-yellow: #d97706;
            --accent-green: #059669;
            --accent-red: #dc2626;
            
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #181818 0%, #000000 100%);
            --panel-bg: rgba(30, 30, 30, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-purple: #a855f7;
            --accent-blue-bbva: #5aa1e3;
            --accent-blue-mp: #52c8ff;
            --accent-yellow: #fbbf24;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0;
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-attachment: fixed; 
            color: var(--text-primary);
            transition: var(--transition);
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        /* --- HEADER DASHBOARD --- */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.3rem; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .header-actions { display: flex; gap: 10px; }
        .theme-btn {
            background-color: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--panel-border);
            padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.85rem;
            transition: var(--transition); display: flex; align-items: center; gap: 6px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* --- GLASSMORPHISM & PANELES --- */
        .stat-card, .month-card, .inner-section, .card-tabs, .bank-debt-card {
            background-color: var(--panel-bg); border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: var(--card-shadow);
        }
        .summary-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 16px; }
        .stat-title { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; }
        .text-purple { color: var(--accent-purple); }
        .months-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .month-card { padding: 20px; border-radius: 16px; }
        .month-header { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }
        .month-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-primary); }

        /* --- SWITCH DE TARJETAS Y BANCOS --- */
        .card-tabs { display: flex; border-radius: 8px; padding: 4px; margin-bottom: 15px; }
        .card-tab { flex: 1; text-align: center; padding: 8px 5px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--text-secondary); transition: var(--transition); }
        .card-tab.active { background-color: rgba(128, 128, 128, 0.15); color: var(--text-primary); border: 1px solid var(--panel-border); }
        .bank-debt-card { padding: 15px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; transition: var(--transition); }
        .bank-debt-card:hover { border-color: var(--accent-purple); }
        .bank-logo { height: 26px; width: auto; max-width: 70px; border-radius: 4px; object-fit: contain; background-color: transparent; }
        .text-Nu { color: var(--accent-purple); }
        .text-BBVA { color: var(--accent-blue-bbva); }
        .text-MP { color: var(--accent-blue-mp); }
        [data-theme="dark"] .text-BBVA { color: #5aa1e3; }
        [data-theme="dark"] .text-MP { color: #52c8ff; }

        /* --- SECCIONES INTERNAS Y BOTONES --- */
        .inner-section { padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .section-title { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 10px; font-weight: bold; text-align: center; }
        .title-green { color: var(--accent-green); }
        .title-red { color: var(--accent-red); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border-color); font-size: 0.95rem; }
        .list-item:last-child { border-bottom: none; }
        
        .btn-action-fa { border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); backdrop-filter: blur(5px); }
        .btn-edit-fa { background-color: rgba(128, 128, 128, 0.15); color: var(--text-primary); border: 1px solid var(--panel-border);}
        .btn-edit-fa:hover { background-color: rgba(128, 128, 128, 0.3); }
        .btn-save-fa { background-color: var(--accent-green); color: white; }
        .btn-cancel-fa { background-color: var(--accent-red); color: white; }
        .btn-delete-fa { background-color: transparent; color: var(--text-secondary); border: none; width: 28px; height: 28px; font-size: 1rem; cursor: pointer; margin-left: 10px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .btn-delete-fa:hover { color: var(--accent-red); }

        /* --- FORMULARIOS --- */
        .add-form { display: flex; gap: 8px; margin-top: 5px; align-items: center; flex-wrap: wrap; }
        .add-form input {
            background-color: rgba(0, 0, 0, 0.03); color: var(--text-primary); border: 1px solid var(--border-color);
            padding: 10px; border-radius: 8px; font-family: inherit; font-size: 16px; backdrop-filter: blur(5px); transition: var(--transition); width: 100%; box-sizing: border-box;
        }
        [data-theme="dark"] .add-form input { background-color: rgba(255, 255, 255, 0.05); }
        .add-form input:focus { outline: none; border-color: var(--accent-purple); background-color: var(--panel-bg); }
        .input-flex { flex: 2; min-width: 100px; }
        .input-monto { flex: 1; min-width: 80px; text-align: right; }
        .input-monto-edit { width: 100px; text-align: right; padding: 8px; border-radius: 6px; border: 1px solid var(--accent-purple); background: rgba(0, 0, 0, 0.03); color: var(--text-primary); font-weight: bold; }
        [data-theme="dark"] .input-monto-edit { background: rgba(255, 255, 255, 0.08); }

        .border-red input.input-monto { border-color: rgba(239, 68, 68, 0.4); }
        .border-green input.input-monto { border-color: rgba(16, 185, 129, 0.4); }
        .input-monto::-webkit-outer-spin-button, .input-monto::-webkit-inner-spin-button, .input-monto-edit::-webkit-outer-spin-button, .input-monto-edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-add-fa { border: none; border-radius: 8px; width: 42px; height: 42px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-add-fa:active { transform: scale(0.95); }
        .btn-green-add { background-color: var(--accent-green); color: white; }
        .btn-red-add { background-color: var(--accent-red); color: white; }

        .total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .total-title { font-weight: bold; font-size: 0.95rem; }
        .total-value { font-size: 1.4rem; font-weight: bold; color: var(--text-primary); }

        @media (max-width: 450px) {
            .add-form input[type="text"] { flex: 1 1 100%; margin-bottom: 5px; }
            .add-form input[type="number"] { flex: 1; text-align: left; }
            .btn-add-fa { width: 48px; height: 42px; flex: 0 0 48px; }
        }

    </style>
</head>
<body>

    <div id="dashboard-view" class="container">
        <header>
            <h1>Gestor Financiero</h1>
            <div class="header-actions">
                <button class="theme-btn" id="themeToggleBtn"><i class="fa-solid fa-sun"></i> Claro</button>
            </div>
        </header>

        <section class="summary-panel">
            <div class="stat-card">
                <div class="stat-title">Deuda Total Acumulada (Global)</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div class="stat-value text-purple" id="total-deuda-global">$0.00</div>
                    <button class="btn-action-fa btn-edit-fa" id="btn-edit-global" title="Editar Deuda Base"><i class="fa-solid fa-pen"></i></button>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-title" id="proximo-pago-title">Próximo Pago Total</div>
                <div class="stat-value" id="proximo-pago">$0.00</div>
            </div>
        </section>

        <section class="months-panel" id="months-container">
            </section>
    </div>

    <script>
        // --- 1. LÓGICA DEL TEMA CON MEMORIA ---
        const themeBtn = document.getElementById('themeToggleBtn');
        const htmlElement = document.documentElement;
        const THEME_KEY = 'miGestorTheme_v1';

        // Revisar si ya hay un tema guardado al abrir la página
        const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
            themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> Claro';
        } else {
            themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> Oscuro';
        }

        // Cambiar tema y guardar la preferencia
        themeBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            let newTheme;
            if (currentTheme === 'dark') {
                newTheme = 'light';
                themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i> Oscuro';
            } else {
                newTheme = 'dark';
                themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i> Claro';
            }
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme); // Guarda el nuevo tema
        });

        // --- 2. GESTIÓN DE BASE DE DATOS Y MESES DINÁMICOS ---
        const DB_KEY_GLOBAL = 'miGestorDeudaGlobal_v9';
        const DB_KEY_DATA = 'miGestorFinancieroData_v9';

        let deudaGlobalBase = parseFloat(localStorage.getItem(DB_KEY_GLOBAL));
        if (isNaN(deudaGlobalBase)) deudaGlobalBase = 10537.00;

        let financeData = [];
        let activeTabState = {}; 
        let editingCardIndex = null; 

        // Calendario oficial de Nu para rellenar meses generados
        const nuSchedule = {
            '2026-03': 2515.50, '2026-04': 1317.29, '2026-05': 1317.28,
            '2026-06': 1101.00, '2026-07': 1101.00, '2026-08': 1101.00,
            '2026-09': 1066.00, '2026-10': 1066.00, '2026-11': 1066.00, '2026-12': 1066.00
        };

        function getMonthName(monthIndex) {
            const names = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            return names[monthIndex - 1]; 
        }

        function createMonthObject(year, monthNum) {
            const id = `${year}-${monthNum.toString().padStart(2, '0')}`;
            return {
                id: id,
                nombre: getMonthName(monthNum),
                deudas: { 'Nu': nuSchedule[id] || 0, 'BBVA': 0, 'Mercado Pago': 0 },
                pagos: [],
                gastosPersonales: []
            };
        }

        function syncMonths() {
            let savedData = localStorage.getItem(DB_KEY_DATA);
            if (savedData) {
                try { financeData = JSON.parse(savedData); } 
                catch(e) { financeData = []; }
            }

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonthNum = now.getMonth() + 1; 
            const currentId = `${currentYear}-${currentMonthNum.toString().padStart(2, '0')}`;

            if (!financeData || financeData.length === 0) {
                financeData = [];
                for(let i=0; i<10; i++) {
                    let y = currentYear;
                    let m = currentMonthNum + i;
                    if (m > 12) { y += Math.floor((m-1)/12); m = ((m-1) % 12) + 1; }
                    financeData.push(createMonthObject(y, m));
                }
            } else {
                while(financeData.length > 0 && financeData[0].id < currentId) {
                    let dropped = financeData.shift();
                    let sumaGastos = dropped.gastosPersonales.reduce((acc, curr) => acc + curr.monto, 0);
                    let sumaPagos = dropped.pagos.reduce((acc, curr) => acc + curr.monto, 0);
                    let sumaDeudasExtra = (dropped.deudas['BBVA'] || 0) + (dropped.deudas['Mercado Pago'] || 0);
                    deudaGlobalBase = deudaGlobalBase + sumaDeudasExtra + sumaGastos - sumaPagos;
                    localStorage.setItem(DB_KEY_GLOBAL, deudaGlobalBase);
                }
                while(financeData.length < 10) {
                    let lastItem = financeData[financeData.length - 1];
                    let parts = lastItem.id.split('-');
                    let y = parseInt(parts[0]);
                    let m = parseInt(parts[1]) + 1;
                    if (m > 12) { y++; m = 1; }
                    financeData.push(createMonthObject(y, m));
                }
            }
            saveData();
        }

        function loadData() {
            const savedData = localStorage.getItem(DB_KEY_DATA);
            if (savedData) financeData = JSON.parse(savedData);
        }

        function saveData() {
            localStorage.setItem(DB_KEY_DATA, JSON.stringify(financeData));
            localStorage.setItem(DB_KEY_GLOBAL, deudaGlobalBase);
        }

        // --- 3. FUNCIONES DE INTERFAZ ---
        const formatMoney = (value) => {
            return '$' + (value || 0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        function renderCards() {
            const container = document.getElementById('months-container');
            container.innerHTML = ''; 
            
            let sumaTotalGastosDeTodosLosMeses = 0;
            let sumaTotalPagosDeTodosLosMeses = 0;
            let sumaDeudasExtraBBVAyMP = 0;

            financeData.forEach((data, index) => {
                try {
                    let sumaGastosMes = 0;
                    let sumaPagosMes = 0;
                    
                    if(!data.deudas) data.deudas = { 'Nu': 0, 'BBVA': 0, 'Mercado Pago': 0 };
                    if(!data.gastosPersonales) data.gastosPersonales = [];
                    if(!data.pagos) data.pagos = [];

                    let sumaTodasTarjetasMes = (data.deudas['Nu'] || 0) + (data.deudas['BBVA'] || 0) + (data.deudas['Mercado Pago'] || 0);
                    sumaDeudasExtraBBVAyMP += (data.deudas['BBVA'] || 0) + (data.deudas['Mercado Pago'] || 0);
                    
                    let currentTab = activeTabState[index] || 'Nu';
                    let deudaTabActual = data.deudas[currentTab] || 0;

                    let logoSrc = 'img/Nu.jpg'; let textClass = 'text-Nu';
                    if(currentTab === 'BBVA') { logoSrc = 'img/bbva.png'; textClass = 'text-BBVA';}
                    if(currentTab === 'Mercado Pago') { logoSrc = 'img/mercadoapgo.png'; textClass = 'text-MP'; }

                    let tarjetaContentHtml = '';
                    if (editingCardIndex == index) {
                        tarjetaContentHtml = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${logoSrc}" alt="${currentTab}" class="bank-logo" onerror="this.style.display='none'">
                                <span style="font-weight: 600;">${currentTab}</span>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <input type="number" id="edit-monto-${index}" class="input-monto-edit" value="${deudaTabActual}">
                                <button class="btn-action-fa btn-save-fa btn-save-tarjeta" data-month="${index}" data-banco="${currentTab}"><i class="fa-solid fa-check"></i></button>
                                <button class="btn-action-fa btn-cancel-fa btn-cancel-tarjeta"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                        `;
                    } else {
                        tarjetaContentHtml = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${logoSrc}" alt="${currentTab}" class="bank-logo" onerror="this.style.display='none'">
                                <span style="font-weight: 600;">${currentTab}</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <strong class="${textClass}" style="font-size: 1.15rem;">${formatMoney(deudaTabActual)}</strong>
                                <button class="btn-action-fa btn-edit-fa btn-edit-tarjeta" data-month="${index}"><i class="fa-solid fa-pen"></i></button>
                            </div>
                        `;
                    }

                    let seccionTarjetasHtml = `
                        <div class="inner-section" style="padding: 10px 15px; margin-bottom: 10px;">
                            <div class="card-tabs">
                                <div class="card-tab tab-switch ${currentTab === 'Nu' ? 'active' : ''}" data-month="${index}" data-tab="Nu">Nu</div>
                                <div class="card-tab tab-switch ${currentTab === 'BBVA' ? 'active' : ''}" data-month="${index}" data-tab="BBVA">BBVA</div>
                                <div class="card-tab tab-switch ${currentTab === 'Mercado Pago' ? 'active' : ''}" data-month="${index}" data-tab="Mercado Pago">MP</div>
                            </div>
                        </div>
                        <div class="bank-debt-card">
                            ${tarjetaContentHtml}
                        </div>
                    `;

                    let listaGastosHtml = '';
                    if (data.gastosPersonales.length > 0) {
                        data.gastosPersonales.forEach((gasto, gastoIndex) => {
                            sumaGastosMes += gasto.monto;
                            sumaTotalGastosDeTodosLosMeses += gasto.monto; 
                            listaGastosHtml += `
                                <div class="list-item">
                                    <span><i class="fa-solid fa-cart-shopping" style="color: var(--accent-red); margin-right: 8px;"></i>${gasto.concepto}</span>
                                    <div style="display: flex; align-items: center;">
                                        <strong>${formatMoney(gasto.monto)}</strong>
                                        <button class="btn-delete-fa btn-delete-gasto" data-month="${index}" data-index="${gastoIndex}" data-monto="${gasto.monto}"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        listaGastosHtml = '<div style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; padding: 5px 0;">Sin gastos extra</div>';
                    }

                    let listaPagosHtml = '';
                    if (data.pagos.length > 0) {
                        data.pagos.forEach((pago, pagoIndex) => {
                            sumaPagosMes += pago.monto;
                            sumaTotalPagosDeTodosLosMeses += pago.monto; 
                            listaPagosHtml += `
                                <div class="list-item">
                                    <span><i class="fa-solid fa-circle-dollar-to-slot" style="color: var(--accent-green); margin-right: 8px;"></i>Pago #${pagoIndex + 1}</span>
                                    <div style="display: flex; align-items: center;">
                                        <strong style="color: var(--accent-green);">- ${formatMoney(pago.monto)}</strong>
                                        <button class="btn-delete-fa btn-delete-pago" data-month="${index}" data-index="${pagoIndex}" data-monto="${pago.monto}"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        listaPagosHtml = '<div style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; padding: 5px 0;">Aún no hay abonos registrados</div>';
                    }

                    // CÁLCULO MES: La deuda nunca bajará de $0.00 visualmente.
                    let totalRestanteMesBruto = sumaTodasTarjetasMes + sumaGastosMes - sumaPagosMes;
                    let totalRestanteMes = Math.max(0, totalRestanteMesBruto);

                    let tituloMesDisplay = index === 0 ? `${data.nombre} (Actual)` : data.nombre;

                    if (index === 0) {
                        document.getElementById('proximo-pago-title').innerText = `Total a Pagar (${data.nombre})`;
                        document.getElementById('proximo-pago').innerText = formatMoney(totalRestanteMes);
                    }

                    const cardHtml = `
                        <div class="month-card">
                            <div class="month-header">
                                <h2>${tituloMesDisplay}</h2>
                            </div>
                            
                            ${seccionTarjetasHtml}

                            <div class="inner-section border-red" style="border-left: 3px solid var(--accent-red);">
                                <div class="section-title title-red"><i class="fa-solid fa-tags"></i> Otros Gastos</div>
                                <div style="margin-bottom: 15px;">${listaGastosHtml}</div>
                                <div class="add-form">
                                    <input type="text" id="concepto-${index}" class="input-flex" placeholder="Concepto">
                                    <input type="number" id="monto-gasto-${index}" class="input-monto" placeholder="$0.00">
                                    <button class="btn-add-fa btn-green-add btn-add-gasto" data-month="${index}"><i class="fa-solid fa-plus"></i></button>
                                </div>
                            </div>

                            <div class="inner-section border-green" style="border-left: 3px solid var(--accent-green);">
                                <div class="section-title title-green"><i class="fa-solid fa-circle-check"></i> Pagos Realizados</div>
                                <div style="margin-bottom: 15px;">${listaPagosHtml}</div>
                                <div class="add-form" style="justify-content: center;">
                                    <input type="number" id="monto-pago-${index}" class="input-monto" style="flex: 1;" placeholder="Cantidad ($)">
                                    <button class="btn-add-fa btn-red-add btn-add-pago" data-month="${index}" title="Restar de la deuda"><i class="fa-solid fa-minus"></i></button>
                                </div>
                            </div>

                            <div class="total-row">
                                <span class="total-title">Total a Pagar</span>
                                <span class="total-value">${formatMoney(totalRestanteMes)}</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                } catch (error) {
                    console.error("Error cargando mes", index, error);
                }
            });

            // La deuda global se calcula matemáticamente de forma perfecta
            const deudaGlobalReal = deudaGlobalBase + sumaDeudasExtraBBVAyMP + sumaTotalGastosDeTodosLosMeses - sumaTotalPagosDeTodosLosMeses;
            document.getElementById('total-deuda-global').innerText = formatMoney(deudaGlobalReal);
        }

        // --- 4. ESCUCHAR INTERACCIONES Y TECLA ENTER ---
        document.getElementById('months-container').addEventListener('keypress', (evento) => {
            if (evento.key === 'Enter') {
                const target = evento.target;
                if (target.classList.contains('input-monto-edit')) {
                    const btn = target.parentElement.querySelector('.btn-save-tarjeta');
                    if(btn) btn.click();
                } else if (target.id.startsWith('monto-gasto') || target.id.startsWith('concepto-')) {
                    const btn = target.parentElement.querySelector('.btn-add-gasto');
                    if(btn) btn.click();
                } else if (target.id.startsWith('monto-pago')) {
                    const btn = target.parentElement.querySelector('.btn-add-pago');
                    if(btn) btn.click();
                }
            }
        });

        document.getElementById('btn-edit-global').addEventListener('click', () => {
            let nuevaDeuda = prompt("Ingresa tu Deuda Total Base Actual (Ej. 10537):", deudaGlobalBase);
            if (nuevaDeuda !== null && !isNaN(parseFloat(nuevaDeuda))) {
                deudaGlobalBase = parseFloat(nuevaDeuda);
                saveData();
                renderCards();
            }
        });

        document.getElementById('months-container').addEventListener('click', (evento) => {
            const targetBtn = evento.target.closest('button') || evento.target;

            if (evento.target.classList.contains('tab-switch')) {
                const indexMes = evento.target.getAttribute('data-month');
                const selectedTab = evento.target.getAttribute('data-tab');
                activeTabState[indexMes] = selectedTab;
                editingCardIndex = null; 
                renderCards();
                return;
            }

            if (targetBtn.classList.contains('btn-edit-tarjeta')) {
                editingCardIndex = targetBtn.getAttribute('data-month');
                renderCards();
            }
            if (targetBtn.classList.contains('btn-cancel-tarjeta')) {
                editingCardIndex = null;
                renderCards();
            }
            if (targetBtn.classList.contains('btn-save-tarjeta')) {
                const index = targetBtn.getAttribute('data-month');
                const banco = targetBtn.getAttribute('data-banco');
                const nuevoMonto = parseFloat(document.getElementById(`edit-monto-${index}`).value);

                if (!isNaN(nuevoMonto) && nuevoMonto >= 0) {
                    financeData[index].deudas[banco] = nuevoMonto; 
                    saveData();
                    editingCardIndex = null;
                    renderCards();
                } else {
                    alert("Ingresa un monto válido.");
                }
            }

            if (targetBtn.classList.contains('btn-add-gasto')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const conceptoStr = document.getElementById(`concepto-${indexMes}`).value.trim();
                const montoNum = parseFloat(document.getElementById(`monto-gasto-${indexMes}`).value);

                if (conceptoStr !== "" && !isNaN(montoNum) && montoNum > 0) {
                    financeData[indexMes].gastosPersonales.push({ concepto: conceptoStr, monto: montoNum });
                    saveData();
                    renderCards();
                } else {
                    alert("Ingresa un concepto y monto válido.");
                }
            }
            if (targetBtn.classList.contains('btn-delete-gasto')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const indexElemento = targetBtn.getAttribute('data-index');
                const monto = parseFloat(targetBtn.getAttribute('data-monto'));
                
                financeData[indexMes].gastosPersonales.splice(indexElemento, 1);
                saveData();
                renderCards();
            }

            if (targetBtn.classList.contains('btn-add-pago')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const montoNum = parseFloat(document.getElementById(`monto-pago-${indexMes}`).value);

                if (!isNaN(montoNum) && montoNum > 0) {
                    financeData[indexMes].pagos.push({ monto: montoNum });
                    saveData();
                    renderCards();
                } else {
                    alert("Por favor, ingresa el monto que abonaste.");
                }
            }
            if (targetBtn.classList.contains('btn-delete-pago')) {
                const indexMes = targetBtn.getAttribute('data-month');
                const indexElemento = targetBtn.getAttribute('data-index');
                const monto = parseFloat(targetBtn.getAttribute('data-monto'));

                financeData[indexMes].pagos.splice(indexElemento, 1);
                saveData();
                renderCards();
            }
        });

        // Al iniciar, sincronizamos las fechas y pintamos los datos
        window.addEventListener('DOMContentLoaded', () => {
            syncMonths();
            loadData();
            renderCards();
        });

    </script>
</body>
</html>
