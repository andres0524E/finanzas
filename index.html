<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Financiero</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8A05BE">
    <link rel="apple-touch-icon" href="assets/img/favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanzas">
    
    <link rel="icon" href="assets/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Gestor Financiero</h1>
            <div class="header-actions">
                <button class="theme-btn" onclick="abrirModalAjustes()" title="Ajustes de Facturación"><i class="fa-solid fa-gear"></i></button>
                <button class="theme-btn" onclick="abrirModalHistorial()" title="Ver Historial"><i class="fa-solid fa-clock-rotate-left"></i></button>
                <button class="theme-btn" onclick="exportData()" title="Descargar Respaldo"><i class="fa-solid fa-download"></i></button>
                <button class="theme-btn" onclick="document.getElementById('import-file').click()" title="Subir Respaldo"><i class="fa-solid fa-upload"></i></button>
                <button class="theme-btn" id="themeToggleBtn" title="Tema Claro/Oscuro"><i class="fa-solid fa-sun"></i></button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </header>

        <section class="summary-panel">
            <div class="stat-card">
                <div class="stat-title">Deuda Acumulada</div>
                <div class="stat-value text-purple" id="total-deuda-global">$0.00</div>
            </div>

            <div class="stat-card">
                <div class="stat-title" id="proximo-pago-title">Total a Pagar</div>
                <div class="stat-value" id="proximo-pago">$0.00</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-title">Ingreso Semanal</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div class="stat-value text-green" id="ingreso-semanal-display">$0.00</div>
                    <button class="btn-action-fa btn-edit-fa" onclick="abrirModalIngreso()" title="Editar Ingreso"><i class="fa-solid fa-pen"></i></button>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-title">Suscripciones / Fijos</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <div class="stat-value text-yellow" id="gastos-fijos-display">$0.00</div>
                    <button class="btn-action-fa btn-edit-fa" onclick="abrirModalFijos()" title="Gestionar Suscripciones"><i class="fa-solid fa-list"></i></button>
                </div>
            </div>
        </section>

        <section class="months-panel" id="months-container"></section>
    </div>

    <div id="modal-transaccion" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 1.2rem;" id="modal-trans-title">Añadir</h2>
                <button class="btn-action-fa btn-edit-fa" onclick="cerrarModalTransaccion()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div id="form-gasto">
                <input type="text" id="trans-concepto" class="form-input mb-3" placeholder="Concepto (Ej. Celular, Cena)" onkeypress="handleModalEnter(event)">
                <div class="form-row mb-3">
                    <input type="number" id="trans-monto-gasto" class="form-input" placeholder="Monto ($)" onkeypress="handleModalEnter(event)">
                    <select id="trans-msi" class="form-input" title="Meses a diferir" onkeypress="handleModalEnter(event)">
                        <option value="1">Contado (1 Mes)</option>
                        <option value="3">3 Meses</option>
                        <option value="6">6 Meses</option>
                        <option value="9">9 Meses</option>
                        <option value="12">12 Meses</option>
                        <option value="15">15 Meses</option>
                        <option value="18">18 Meses</option>
                        <option value="24">24 Meses</option>
                    </select>
                </div>
            </div>

            <div id="form-pago" style="display: none;">
                <input type="number" id="trans-monto-pago" class="form-input mb-3" placeholder="Cantidad a abonar ($)" onkeypress="handleModalEnter(event)">
            </div>

            <button class="btn-auth" onclick="procesarTransaccionModal()">Guardar</button>
        </div>
    </div>

    <div id="modal-ajustes" class="modal-overlay">
        <div class="modal-content" style="max-width: 320px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 1.2rem;">Fechas</h2>
                <button class="btn-action-fa btn-edit-fa" onclick="cerrarModalAjustes()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="form-row mb-3">
                <div style="flex: 1;">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); font-weight: bold; margin-bottom: 5px; display: block;">Día de Corte:</label>
                    <input type="number" id="input-dia-corte" class="form-input" placeholder="28" min="1" max="31">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); font-weight: bold; margin-bottom: 5px; display: block;">Día Límite:</label>
                    <input type="number" id="input-dia-limite" class="form-input" placeholder="8" min="1" max="31">
                </div>
            </div>
            <button class="btn-auth" onclick="guardarAjustes()">Guardar</button>
        </div>
    </div>

    <div id="modal-ingreso" class="modal-overlay">
        <div class="modal-content" style="max-width: 320px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 1.2rem;">Ingreso Semanal</h2>
                <button class="btn-action-fa btn-edit-fa" onclick="cerrarModalIngreso()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="number" id="input-ingreso-semanal" class="form-input mb-3" placeholder="$1000.00" onkeypress="handleIngresoEnter(event)">
            <button class="btn-auth" onclick="guardarIngreso()">Guardar</button>
        </div>
    </div>

    <div id="modal-confirmacion" class="modal-overlay">
        <div class="modal-content" style="text-align: center; max-width: 320px;">
            <i class="fa-solid fa-triangle-exclamation text-yellow" style="font-size: 3rem; margin-bottom: 15px;"></i>
            <h2 style="margin: 0 0 10px 0; font-size: 1.2rem;" id="confirm-title">¿Estás seguro?</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px;" id="confirm-msg">Esta acción no se puede deshacer.</p>
            <div style="display: flex; gap: 10px;">
                <button class="btn-auth" style="background-color: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--border-color);" onclick="cerrarModalConfirmacion()">Cancelar</button>
                <button class="btn-auth" id="btn-confirm-action">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal-fijos" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 1.2rem;">Suscripciones Fijas</h2>
                <button class="btn-action-fa btn-edit-fa" onclick="cerrarModalFijos()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="lista-fijos-modal" style="margin-bottom: 15px; max-height: 200px; overflow-y: auto;"></div>
            <div class="expense-form-grid" style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color);">
                <input type="text" id="nuevo-fijo-concepto" class="input-flex" placeholder="Concepto">
                <input type="number" id="nuevo-fijo-monto" placeholder="$0.00">
                <button class="btn-add-fa btn-green-add" onclick="agregarGastoFijo()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-historial" class="modal-overlay">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 1.2rem;">Historial Pasado</h2>
                <button class="btn-action-fa btn-edit-fa" onclick="cerrarModalHistorial()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="lista-historial-modal" style="margin-bottom: 15px; max-height: 60vh; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Lista y funcionando offline'))
                    .catch(err => console.log('Error PWA: ', err));
            });
        }
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
